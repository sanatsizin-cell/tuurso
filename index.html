<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Turso Test</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">
  <h2>Netlify + Turso Testi</h2>
  <button onclick="testEt()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Veritabanına Bağlan</button>
  <pre id="sonuc" style="margin-top: 20px; background: #eee; padding: 15px; text-align: left;"></pre>

  <script>
    async function testEt() {
      document.getElementById('sonuc').innerText = "Turso'ya bağlanılıyor...";
      try {
        const response = await fetch('/api/test');
        const data = await response.json();
        document.getElementById('sonuc').innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('sonuc').innerText = "Bağlantı Hatası: " + err.message;
      }
    }
  </script>
</body>
</html>
